<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#gradient1)"/>

  <!-- Outer screen frame -->
  <rect x="8" y="9" width="16" height="14" rx="1.5" fill="none" stroke="white" stroke-width="1.2" opacity="0.9"/>

  <!-- Middle screen -->
  <rect x="10" y="11" width="12" height="10" rx="1" fill="white" opacity="0.7"/>

  <!-- Inner screen -->
  <rect x="12" y="13" width="8" height="6" rx="0.5" fill="white" opacity="0.9"/>

  <!-- Pixel corners -->
  <circle cx="11" cy="12" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="21" cy="12" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="11" cy="20" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="21" cy="20" r="0.8" fill="white" opacity="0.8"/>
</svg>
